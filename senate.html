<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisconsin Senate Districts — 2024 Projected Margins</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dem-dark: #1a3a6b;
    --dem-mid: #3b6fc4;
    --dem-light: #a8c4e8;
    --rep-light: #f0a0a0;
    --rep-mid: #d93b3b;
    --rep-dark: #7a1010;
    --neutral: #e8e4dc;
    --bg: #f5f3ef;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #ddd;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header {
    background: #0f1f3d;
    color: white;
    padding: 0 28px;
    display: flex;
    align-items: stretch;
    border-bottom: 3px solid #c8a84b;
    gap: 24px;
  }

  .header-title {
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-right: 8px;
  }

  header h1 { font-size: 1.15rem; font-weight: 700; font-family: 'Georgia', serif; }
  header .subtitle { font-size: 0.78rem; color: #aab8d0; font-family: sans-serif; font-style: italic; margin-top: 2px; }

  nav { display: flex; align-items: stretch; gap: 2px; margin-left: auto; }

  nav a {
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aab8d0;
    text-decoration: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: color 0.15s, border-color 0.15s;
  }

  nav a:hover { color: white; }
  nav a.active { color: white; border-bottom-color: #c8a84b; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .map-panel { position: relative; background: #dce8f0; overflow: hidden; }
  #map-svg { width: 100%; height: 100%; }

  .district-path { stroke: #fff; stroke-width: 0.5px; cursor: pointer; transition: opacity 0.15s; }
  .district-path:hover { stroke: #111; stroke-width: 1.5px; opacity: 0.85; }
  .district-path.selected { stroke: #111; stroke-width: 2px; }
  .district-path.not-up { cursor: default; }
  .district-path.not-up:hover { stroke: #ccc; stroke-width: 0.5px; opacity: 1; }

  .legend {
    position: absolute; bottom: 20px; left: 20px;
    background: rgba(255,255,255,0.93); border-radius: 6px;
    padding: 12px 14px; box-shadow: var(--shadow);
    font-family: sans-serif; font-size: 11px;
  }
  .legend-title { font-weight: 700; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .legend-bar { width: 200px; height: 12px; border-radius: 3px; margin-bottom: 4px; background: linear-gradient(to right, #1a3a6b, #6b96d4, #d4e4f7, #f5d4d4, #d93b3b, #7a1010); }
  .legend-labels { display: flex; justify-content: space-between; color: var(--text-muted); }
  .legend-labels .d { color: #1a3a6b; font-weight: 700; }
  .legend-labels .r { color: #7a1010; font-weight: 700; }
  .legend-not-up { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
  .legend-not-up-swatch { width: 14px; height: 14px; background: #c8c4bc; border-radius: 2px; flex-shrink: 0; }

  .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; height: 100%; }

  .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: #f9f8f6; }
  .sidebar-header h2 { font-size: 0.95rem; font-weight: 700; font-family: sans-serif; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  .search-box { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: sans-serif; background: white; color: var(--text); }
  .search-box:focus { outline: 2px solid #3b6fc4; border-color: transparent; }

  .detail-panel { padding: 20px; border-bottom: 1px solid var(--border); display: none; max-height: 260px; overflow-y: auto; flex-shrink: 0; }
  .detail-panel.visible { display: block; }

  .detail-district-num { font-size: 2.2rem; font-weight: 700; line-height: 1; font-family: sans-serif; margin-bottom: 2px; }
  .detail-district-num.R { color: var(--rep-dark); }
  .detail-district-num.D { color: var(--dem-dark); }
  .detail-district-num.N { color: #888; }

  .detail-margin { font-size: 1rem; font-weight: 700; font-family: sans-serif; margin-bottom: 10px; }
  .detail-margin.R { color: var(--rep-mid); }
  .detail-margin.D { color: var(--dem-mid); }
  .detail-margin.N { color: #999; }

  .detail-row { display: flex; justify-content: space-between; font-size: 12.5px; font-family: sans-serif; padding: 4px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text-muted); flex-shrink: 0; }
  .detail-value { font-weight: 600; text-align: right; }
  .detail-value.R { color: var(--rep-dark); }
  .detail-value.D { color: var(--dem-dark); }

  .margin-bar-wrap { margin: 10px 0; }
  .margin-bar-bg { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .margin-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

  .note-badge { display: inline-block; background: #fff3cd; border: 1px solid #ffc107; border-radius: 3px; padding: 2px 7px; font-size: 11px; font-family: sans-serif; margin-top: 6px; color: #7a5c00; }

  .district-list-wrap { flex: 1; overflow-y: auto; min-height: 0; }
  .district-list { list-style: none; }

  .district-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; border-bottom: 1px solid #f3f3f3; font-family: sans-serif; font-size: 13px; transition: background 0.1s; }
  .district-item:hover { background: #f5f3ef; }
  .district-item.active { background: #edf2fb; }

  .di-num { font-weight: 700; width: 28px; flex-shrink: 0; font-size: 13px; color: var(--text-muted); }
  .di-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .di-info { flex: 1; min-width: 0; }
  .di-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12.5px; margin-bottom: 1px; }
  .di-margin { font-size: 11.5px; font-weight: 700; }
  .di-margin.R { color: var(--rep-mid); }
  .di-margin.D { color: var(--dem-mid); }
  .di-margin.N { color: #999; font-weight: 400; font-style: italic; }

  .filter-tabs { display: flex; gap: 0; margin-top: 10px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .filter-tab { flex: 1; padding: 5px 8px; font-size: 11px; font-family: sans-serif; font-weight: 600; text-align: center; cursor: pointer; background: white; border: none; border-right: 1px solid var(--border); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .filter-tab:last-child { border-right: none; }
  .filter-tab.active { background: #0f1f3d; color: white; }
  .filter-tab.active.D { background: var(--dem-dark); }
  .filter-tab.active.R { background: var(--rep-dark); }
  .no-results { padding: 20px; font-family: sans-serif; font-size: 13px; color: var(--text-muted); text-align: center; }
</style>
</head>

const CHAMBER = 'senate';

function parseMargin(str) {
  if (!str) return { party: null, val: 0 };
  const m = String(str).trim();
  if (m.startsWith('R+')) return { party: 'R', val: parseFloat(m.slice(2)) };
  if (m.startsWith('D+')) return { party: 'D', val: parseFloat(m.slice(2)) };
  return { party: null, val: 0 };
}

function marginColor(str) {
  if (!str) return '#c8c4bc';
  const { party, val } = parseMargin(str);
  if (!party) return '#c8c4bc';
  const score = party === 'R' ? Math.min(val, 60) : -Math.min(val, 60);
  const stops = [
    [-60, '#1a3a6b'], [-30, '#3b6fc4'], [-10, '#a8c4e8'],
    [0, '#e8e4dc'], [10, '#f0a0a0'], [30, '#d93b3b'], [60, '#7a1010']
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const [a, ca] = stops[i], [b, cb] = stops[i+1];
    if (score >= a && score <= b) {
      const t = (score - a) / (b - a);
      return interpolateColor(ca, cb, t);
    }
  }
  return score < -60 ? stops[0][1] : stops[stops.length-1][1];
}

function interpolateColor(c1, c2, t) {
  const hex = c => parseInt(c.slice(1), 16);
  const r1=hex(c1)>>16, g1=(hex(c1)>>8)&0xff, b1=hex(c1)&0xff;
  const r2=hex(c2)>>16, g2=(hex(c2)>>8)&0xff, b2=hex(c2)&0xff;
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

const svg = d3.select('#map-svg');
let selectedDistrict = null;
let activeFilter = 'all';
let searchQuery = '';

function drawMap() {
  const el = document.querySelector('.map-panel');
  const w = el.clientWidth, h = el.clientHeight;
  svg.selectAll('*').remove();
  const projection = d3.geoMercator().fitSize([w, h], GEOJSON);
  const path = d3.geoPath().projection(projection);
  const g = svg.append('g');
  g.selectAll('path')
    .data(GEOJSON.features)
    .enter().append('path')
    .attr('class', d => {
      const notUp = !d.properties.projected;
      return 'district-path' + (notUp ? ' not-up' : '') + (selectedDistrict === d.properties.district ? ' selected' : '');
    })
    .attr('d', path)
    .attr('fill', d => marginColor(d.properties.projected))
    .on('click', function(event, d) {
      if (d.properties.projected) selectDistrict(d.properties.district);
    });
}

function selectDistrict(distNum) {
  selectedDistrict = distNum;
  d3.selectAll('.district-path').classed('selected', d => d.properties.district === distNum);
  document.querySelectorAll('.district-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.district) === distNum);
  });
  const active = document.querySelector(`.district-item[data-district="${distNum}"]`);
  if (active) active.scrollIntoView({ block: 'nearest' });
  const feat = GEOJSON.features.find(f => f.properties.district === distNum);
  if (feat) showDetail(feat.properties);
}

function showDetail(props) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  panel.classList.add('visible');

  const proj = parseMargin(props.projected);
  const gb = parseMargin(props.generic_ballot);
  const partyClass = proj.party || 'N';
  const barWidth = proj.party ? Math.min(proj.val / 60 * 100, 100) : 0;
  const barColor = proj.party === 'R' ? 'var(--rep-mid)' : proj.party === 'D' ? 'var(--dem-mid)' : '#ccc';
  const incumbent = (props.incumbent || '').trim();
  const candidate1 = (props.candidate1 || '').trim();
  const candidate2 = (props.candidate2 || '').trim();
  const notes = (props.notes || '').trim();

  const marginLabel = props.projected || 'Not up in 2024';

  content.innerHTML = `
    <div style="margin-bottom:10px;">
      <div class="detail-district-num ${partyClass}">District ${props.district}</div>
      <div class="detail-margin ${partyClass}">${marginLabel}</div>
      ${proj.party ? `<div class="margin-bar-wrap"><div class="margin-bar-bg"><div class="margin-bar-fill" style="width:${barWidth}%; background:${barColor};"></div></div></div>` : ''}
      ${notes ? `<div class="note-badge">${notes}</div>` : ''}
    </div>
    <div class="detail-row"><span class="detail-label">Incumbent</span><span class="detail-value">${incumbent || '—'}</span></div>
    ${candidate1 ? `<div class="detail-row"><span class="detail-label">Candidate 1</span><span class="detail-value">${candidate1}</span></div>` : ''}
    ${candidate2 ? `<div class="detail-row"><span class="detail-label">Candidate 2</span><span class="detail-value">${candidate2}</span></div>` : ''}
    ${props.generic_ballot ? `<div class="detail-row"><span class="detail-label">Generic Ballot</span><span class="detail-value ${gb.party || ''}">${props.generic_ballot}</span></div>` : ''}
  `;
}

function renderList() {
  const list = document.getElementById('district-list');
  let features = GEOJSON.features.filter(f => f.properties.district);

  if (activeFilter === 'D') features = features.filter(f => parseMargin(f.properties.projected).party === 'D');
  else if (activeFilter === 'R') features = features.filter(f => parseMargin(f.properties.projected).party === 'R');
  else if (activeFilter === 'close') features = features.filter(f => {
    const p = parseMargin(f.properties.projected);
    return p.party && p.val <= 10;
  });

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    features = features.filter(f => {
      const p = f.properties;
      return String(p.district).includes(q)
        || (p.incumbent||'').toLowerCase().includes(q)
        || (p.candidate1||'').toLowerCase().includes(q)
        || (p.candidate2||'').toLowerCase().includes(q);
    });
  }

  features.sort((a, b) => a.properties.district - b.properties.district);

  if (features.length === 0) {
    list.innerHTML = '<li class="no-results">No districts match.</li>';
    return;
  }

  list.innerHTML = features.map(f => {
    const p = f.properties;
    const proj = parseMargin(p.projected);
    const color = marginColor(p.projected);
    const incumbent = (p.incumbent || '').trim().replace(/\s*\(.*\)\s*/g, '').trim();
    const isActive = selectedDistrict === p.district;
    const marginLabel = p.projected || 'Not up 2024';
    const partyClass = proj.party || 'N';
    return `<li class="district-item${isActive ? ' active' : ''}" data-district="${p.district}">
      <span class="di-num">${p.district}</span>
      <span class="di-swatch" style="background:${color}"></span>
      <span class="di-info">
        <div class="di-name">${incumbent || (p.projected ? 'Open Seat' : 'Not up 2024')}</div>
        <div class="di-margin ${partyClass}">${marginLabel}</div>
      </span>
    </li>`;
  }).join('');

  list.querySelectorAll('.district-item').forEach(el => {
    el.addEventListener('click', () => selectDistrict(parseInt(el.dataset.district)));
  });
}

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    renderList();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

window.addEventListener('resize', drawMap);
drawMap();
renderList();
</script>
</body>
</html>
